<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480">
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="#f0fdf4"/>
  <g transform="translate(80,60)">
    <ellipse cx="340" cy="300" rx="300" ry="85" fill="rgba(6,78,59,0.06)"/>

    <!-- bowl -->
    <g transform="translate(80,40)">
      <rect x="60" y="120" width="420" height="90" rx="45" fill="#fff" stroke="#e6f4ea" stroke-width="2"/>
      <path d="M80 120 q220 -90 380 0" fill="url(#g)" opacity="0.95"/>
      <g transform="translate(140,90)">
        <circle cx="40" cy="10" r="10" fill="#fff9"/>
      </g>
    </g>

    <!-- hands and produce -->
    <g transform="translate(0,0)">
      <path d="M30 220 q40 -60 120 -40" fill="none" stroke="#f97316" stroke-width="8" stroke-linecap="round"/>
      <path d="M180 170 q40 -30 80 0" fill="#f59e0b" stroke="#c2410c" stroke-width="2"/>

      <circle cx="260" cy="150" r="14" fill="#fff" opacity="0.6"/>

      <path d="M420 210 q40 -40 80 -20" fill="#ecfccb" stroke="#84cc16" stroke-width="3"/>
    </g>

    <!-- people icons -->
    <g transform="translate(520,80)">
      <circle cx="30" cy="30" r="28" fill="#fff"/>
      <circle cx="30" cy="30" r="12" fill="#10b981"/>
      <rect x="8" y="70" width="44" height="28" rx="8" fill="#10b981"/>
    </g>

    <g transform="translate(420,80)">
      <circle cx="30" cy="30" r="28" fill="#fff"/>
      <circle cx="30" cy="30" r="12" fill="#34d399"/>
      <rect x="8" y="70" width="44" height="28" rx="8" fill="#34d399"/>
    </g>

    <text x="0" y="-10" font-family="Inter, Arial, sans-serif" font-size="26" fill="#064e3b">Community Food Sharing</text>
  </g>
</svg>